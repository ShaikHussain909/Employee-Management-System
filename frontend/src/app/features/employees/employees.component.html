<div class="container">

  <!-- SEARCH + ADD EMPLOYEE BUTTON -->
  <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">

    <mat-form-field appearance="outline">
      <mat-label>Search</mat-label>
      <input matInput [(ngModel)]="searchText" (keyup)="onSearch()" />
    </mat-form-field>

    <!-- ADD EMPLOYEE BUTTON -->
    <button mat-raised-button
            color="primary"
            *ngIf="canEdit()"
            (click)="onAddEmployee()">

      <mat-icon>add</mat-icon>
      Add Employee

    </button>

  </div>

  <!-- LOADING SPINNER -->
  <app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

  <div *ngIf="!isLoading">

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <!-- ID -->
      <ng-container matColumnDef="empId">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let element">{{element.empId}}</td>
      </ng-container>

      <!-- FIRST NAME -->
      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef>First Name</th>
        <td mat-cell *matCellDef="let element">{{element.firstName}}</td>
      </ng-container>

      <!-- LAST NAME -->
      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef>Last Name</th>
        <td mat-cell *matCellDef="let element">{{element.lastName}}</td>
      </ng-container>

      <!-- EMAIL -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let element">{{element.email}}</td>
      </ng-container>

      <!-- PHONE -->
      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>Phone</th>
        <td mat-cell *matCellDef="let element">{{element.phone}}</td>
      </ng-container>

      <!-- SALARY -->
      <ng-container matColumnDef="salary">
        <th mat-header-cell *matHeaderCellDef>Salary</th>
        <td mat-cell *matCellDef="let element">{{element.salary}}</td>
      </ng-container>

      <!-- DEPARTMENT -->
      <ng-container matColumnDef="departmentName">
        <th mat-header-cell *matHeaderCellDef>Department</th>
        <td mat-cell *matCellDef="let element">{{element.departmentName}}</td>
      </ng-container>

      <!-- DESIGNATION -->
      <ng-container matColumnDef="designationName">
        <th mat-header-cell *matHeaderCellDef>Designation</th>
        <td mat-cell *matCellDef="let element">{{element.designationName}}</td>
      </ng-container>

      <!-- ACTIONS -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>

        <td mat-cell *matCellDef="let element">

          <!-- EDIT -->
          <button mat-icon-button
                  color="primary"
                  *ngIf="canEdit()"
                  (click)="onEdit(element)">
            <mat-icon>edit</mat-icon>
          </button>

          <!-- DELETE -->
          <button mat-icon-button
                  color="warn"
                  *ngIf="canDelete()"
                  (click)="onDelete(element.empId)">
            <mat-icon>delete</mat-icon>
          </button>

        </td>

      </ng-container>

      <!-- HEADER -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <!-- ROW -->
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <!-- PAGINATOR -->
    <mat-paginator
      [length]="totalRecords"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5,10,20]"
      (page)="onPageChange($event)">
    </mat-paginator>

  </div>

</div>
