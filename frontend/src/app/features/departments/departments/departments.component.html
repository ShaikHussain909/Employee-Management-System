<div class="page-container">

  <div class="header">
    <h2>Departments</h2>

    <button mat-raised-button color="primary" (click)="openAddDepartmentDialog()">
      <mat-icon>add</mat-icon>
      Add Department
    </button>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!-- ID -->
    <ng-container matColumnDef="departmentId">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let dept">{{dept.departmentId}}</td>
    </ng-container>

    <!-- Department Name -->
    <ng-container matColumnDef="departmentName">
      <th mat-header-cell *matHeaderCellDef>Department Name</th>
      <td mat-cell *matCellDef="let dept">{{dept.departmentName}}</td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>

      <td mat-cell *matCellDef="let dept">

        <button mat-icon-button (click)="editDepartment(dept)" color="primary">
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button (click)="deleteDepartment(dept.departmentId)" color="warn">
          <mat-icon>delete</mat-icon>
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</div>
